version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexxus-postgres
    environment:
      POSTGRES_DB: nexxus_pro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nexxus-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexxus-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nexxus-network
    restart: unless-stopped

networks:
  nexxus-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: